providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_22", "openssl"]
nixOverlays = []

[phases.install]
dependsOn = ["setup"]
cmds = ["npm ci"]

[phases.build]
dependsOn = ["install"]
cmds = ["npm run build"]

[start]
cmd = "npm run start"

[variables]
NODE_VERSION = "22"
NIXPACKS_NODE_VERSION = "22"
